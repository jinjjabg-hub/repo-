<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 명함첩 · BNI 자이언츠</title>
<link rel="manifest" href="namecard.json">
<meta name="theme-color" content="#b89a3a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BNI 명함첩">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --dark:#080808; --dark2:#111; --dark3:#1a1a1a;
  --gold:#b89a3a; --gold2:#d4af5a;
  --cream:#f5f0e8; --red:#C8102E;
  --line:rgba(255,255,255,0.06);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:#fff;min-height:100vh;max-width:480px;margin:0 auto;}

/* 헤더 */
.header{
  position:sticky;top:0;z-index:99;
  background:rgba(8,8,8,0.95);backdrop-filter:blur(12px);
  padding:16px 20px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.header-left{display:flex;align-items:center;gap:10px;}
.back-btn{
  background:none;border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.5);font-size:18px;
  width:36px;height:36px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.header-title{font-size:17px;font-weight:800;}
.card-count{
  background:var(--gold);color:#fff;
  font-size:11px;font-weight:800;
  padding:3px 9px;border-radius:20px;
}
.clear-btn{
  background:none;border:none;color:rgba(255,255,255,0.25);
  font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
}

/* 빈 상태 */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;gap:16px;padding:40px 24px;text-align:center;
}
.empty-icon{font-size:56px;opacity:0.3;}
.empty-title{font-size:18px;font-weight:700;color:rgba(255,255,255,0.4);}
.empty-desc{font-size:13px;color:rgba(255,255,255,0.2);line-height:1.8;}

/* 명함 리스트 */
.cards-list{padding:16px;}
.card-item{
  background:var(--dark3);border:1px solid var(--line);
  border-radius:18px;padding:18px;margin-bottom:12px;
  display:flex;gap:14px;align-items:center;
  position:relative;overflow:hidden;
  transition:border-color 0.2s;
}
.card-item:hover{border-color:rgba(184,154,58,0.3);}
.card-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:linear-gradient(to bottom,var(--gold),transparent);
}
.card-photo{
  width:62px;height:62px;border-radius:50%;overflow:hidden;
  border:2px solid rgba(184,154,58,0.3);flex-shrink:0;
  background:var(--dark2);display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
.card-photo img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.card-body{flex:1;min-width:0;}
.card-name{font-size:17px;font-weight:900;margin-bottom:2px;}
.card-company{font-size:13px;color:var(--gold2);font-weight:700;margin-bottom:4px;}
.card-field{font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;}
.card-tag{
  background:rgba(200,16,46,0.15);border:1px solid rgba(200,16,46,0.25);
  color:rgba(255,120,120,0.8);font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:4px;letter-spacing:0.5px;
}
.card-date{font-size:10px;color:rgba(255,255,255,0.15);margin-top:6px;}

/* 액션 버튼 */
.card-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.act-btn{
  width:38px;height:38px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;transition:all 0.2s;
}
.act-call{background:rgba(13,68,37,0.8);}
.act-view{background:rgba(184,154,58,0.15);border:1px solid rgba(184,154,58,0.2);}
.act-del{background:rgba(255,255,255,0.04);}
.act-btn:hover{transform:scale(1.1);}

/* 홈화면 추가 배너 */
.install-banner{
  display:none;
  margin:12px 16px 0;
  background:linear-gradient(135deg,rgba(184,154,58,0.15),rgba(184,154,58,0.05));
  border:1.5px solid rgba(184,154,58,0.3);
  border-radius:16px;padding:14px 16px;
  align-items:center;gap:12px;
}
.install-banner.show{display:flex;}
.install-icon{font-size:28px;flex-shrink:0;}
.install-text strong{display:block;font-size:13px;font-weight:800;color:var(--gold2);margin-bottom:2px;}
.install-text span{font-size:11px;color:rgba(255,255,255,0.35);}
.install-btn{
  margin-left:auto;flex-shrink:0;
  background:var(--gold);color:#fff;border:none;
  font-family:'Noto Sans KR',sans-serif;
  font-size:12px;font-weight:800;
  padding:9px 14px;border-radius:10px;cursor:pointer;
  white-space:nowrap;
}
.ios-guide{
  display:none;
  margin:12px 16px 0;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--line);
  border-radius:16px;padding:14px 16px;
  font-size:12px;color:rgba(255,255,255,0.45);line-height:1.9;
}
.ios-guide.show{display:block;}
.ios-guide strong{color:var(--gold2);}
.footer-info{
  text-align:center;padding:20px;
  font-size:11px;color:rgba(255,255,255,0.15);line-height:1.8;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="history.back()">←</button>
    <span class="header-title">📋 내 명함첩</span>
    <span class="card-count" id="count-badge">0장</span>
  </div>
  <button class="clear-btn" onclick="clearAll()">전체삭제</button>
</div>

<!-- 홈화면 추가 배너 (안드로이드) -->
<div class="install-banner" id="install-banner">
  <div class="install-icon">📲</div>
  <div class="install-text">
    <strong>홈화면에 추가하기</strong>
    <span>아이콘 하나로 바로 열어요</span>
  </div>
  <button class="install-btn" onclick="installApp()">추가</button>
</div>

<!-- iOS 안내 -->
<div class="ios-guide" id="ios-guide">
  📲 <strong>홈화면에 추가하는 방법 (아이폰)</strong><br>
  하단 공유버튼 <strong>□↑</strong> 탭<br>
  → <strong>"홈 화면에 추가"</strong> 선택<br>
  → 다음부터 아이콘으로 바로 열려요!
</div>

<div id="empty-state" class="empty" style="display:none;">
  <div class="empty-icon">📭</div>
  <div class="empty-title">저장된 명함이 없어요</div>
  <div class="empty-desc">
    BNI 멤버 명함 페이지에서<br>
    "명함첩에 저장" 버튼을 눌러보세요
  </div>
</div>

<div id="cards-list" class="cards-list"></div>

<div class="footer-info">
  명함첩은 이 기기 브라우저에 저장됩니다<br>
  브라우저 데이터 삭제 시 함께 삭제될 수 있어요
</div>

<script>
function loadCards() {
  const cards = JSON.parse(localStorage.getItem('bni_cards') || '[]');
  const badge = document.getElementById('count-badge');
  const list  = document.getElementById('cards-list');
  const empty = document.getElementById('empty-state');

  badge.textContent = cards.length + '장';

  if (cards.length === 0) {
    empty.style.display = 'flex';
    list.style.display  = 'none';
    return;
  }

  empty.style.display = 'none';
  list.style.display  = 'block';

  list.innerHTML = cards.map((c, i) => `
    <div class="card-item" id="card-${i}">
      <div class="card-photo">
        <img src="${c.url.replace(/\/$/, '')}/${c.photo}"
             onerror="this.parentNode.innerHTML='👤'" alt="${c.name}">
      </div>
      <div class="card-body">
        <div class="card-name">${c.name} <span style="font-size:13px;font-weight:400;color:rgba(255,255,255,0.4);">${c.role}</span></div>
        <div class="card-company">${c.company}</div>
        <div class="card-field">${c.field}</div>
        <div class="card-tags">
          <span class="card-tag">BNI</span>
          <span class="card-tag" style="background:rgba(184,154,58,0.12);border-color:rgba(184,154,58,0.25);color:var(--gold2);">${c.chapter}</span>
        </div>
        <div class="card-date">저장일 ${c.savedAt}</div>
      </div>
      <div class="card-actions">
        <button class="act-btn act-call" onclick="location.href='tel:${c.phone}'" title="전화">📞</button>
        <button class="act-btn act-view" onclick="location.href='${c.url}'" title="명함보기">👁</button>
        <button class="act-btn act-del"  onclick="deleteCard(${i})" title="삭제">🗑</button>
      </div>
    </div>
  `).join('');
}

function deleteCard(i) {
  if (!confirm('이 명함을 삭제할까요?')) return;
  let cards = JSON.parse(localStorage.getItem('bni_cards') || '[]');
  cards.splice(i, 1);
  localStorage.setItem('bni_cards', JSON.stringify(cards));
  loadCards();
}

function clearAll() {
  if (!confirm('명함첩을 전체 비울까요?')) return;
  localStorage.removeItem('bni_cards');
  loadCards();
}

// 홈화면 추가
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // 명함 저장 후 리다이렉트로 온 경우 → 자동으로 설치 팝업
  const autoInstall = sessionStorage.getItem('auto_install');
  if (autoInstall) {
    sessionStorage.removeItem('auto_install');
    setTimeout(() => { installApp(); }, 800);
  } else {
    document.getElementById('install-banner').classList.add('show');
  }
});

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').classList.remove('show');
  deferredPrompt = null;
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').classList.remove('show');
    });
  } else {
    document.getElementById('install-banner').classList.add('show');
  }
}

// iOS 감지 → 안내 표시
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
if (isIOS && !isStandalone) {
  // 명함 저장 후 온 경우 iOS도 안내 강조
  const autoInstall = sessionStorage.getItem('auto_install');
  if (autoInstall) sessionStorage.removeItem('auto_install');
  document.getElementById('ios-guide').classList.add('show');
}

loadCards();
</script>
</body>
</html>
